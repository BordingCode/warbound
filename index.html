<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <meta name="theme-color" content="#0c0f17">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Warbound">
  <title>Warbound</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/favicon.svg">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/tokens.css?v=1">
  <link rel="stylesheet" href="css/board.css?v=2">
  <link rel="stylesheet" href="css/units.css?v=11">
  <link rel="stylesheet" href="css/hud.css?v=31">
</head>
<body>
  <div id="app"></div>
  <div id="drag-layer"></div>
  <script type="module" src="js/main.js?v=72"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
    }
    // Capture the Android/Chrome install prompt so an in-app "Install app" button can fire it later.
    window.__installPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); window.__installPrompt = e; window.dispatchEvent(new Event('wb-installable')); });
    window.addEventListener('appinstalled', () => { window.__installPrompt = null; window.dispatchEvent(new Event('wb-installed')); });
  </script>
</body>
</html>
