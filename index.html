<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <meta name="theme-color" content="#0c0f17">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<body>
  <div id="app"></div>
  <div id="drag-layer"></div>
  <script type="module" src="js/main.js?v=100"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
    }
    // Capture the Android/Chrome install prompt so an in-app "Install app" button can fire it later.
    window.__installPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); window.__installPrompt = e; window.dispatchEvent(new Event('wb-installable')); });
    window.addEventListener('appinstalled', () => { window.__installPrompt = null; window.dispatchEvent(new Event('wb-installed')); });
  </script>
  <!-- hub-stats visit counter -->
  <script>(function(){try{var A="warbound",K="hubdev",d=localStorage.getItem(K);if(!d){d=(self.crypto&&crypto.randomUUID?crypto.randomUUID():Date.now()+"."+Math.random().toString(36).slice(2));localStorage.setItem(K,d);}var u="https://hub-stats.mathiasjob.workers.dev/hit",b=JSON.stringify({app:A,d:d});if(navigator.sendBeacon){navigator.sendBeacon(u,b);}else{fetch(u,{method:"POST",body:b,keepalive:true,mode:"no-cors"});}}catch(e){}})();</script>
</body>
</html>
